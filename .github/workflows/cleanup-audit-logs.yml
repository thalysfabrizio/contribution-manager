name: Cleanup audit logs

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (count only, no deletion)'
        type: boolean
        default: false

jobs:
  cleanup:
    name: Delete expired audit logs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run cleanup script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm run cleanup:audit-logs -- --dry-run
          else
            npm run cleanup:audit-logs
          fi
