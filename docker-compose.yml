services:
  db:
    image: postgres:16-alpine
    container_name: contribution-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contribution_manager
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  neon-proxy:
    image: ghcr.io/timowilhelm/local-neon-http-proxy:main
    container_name: contribution-neon-proxy
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4444:4444"
    environment:
      PG_CONNECTION_STRING: postgres://postgres:postgres@db:5432/contribution_manager

volumes:
  pgdata:
