services:
  db:
    image: postgres:16-alpine
    container_name: contribution-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contribution_manager
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-e2e-db.sql:/docker-entrypoint-initdb.d/init-e2e-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
